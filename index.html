<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原材料价格监控 | 星辰科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                        <span class="text-2xl font-bold">¥</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">原材料价格监控</h1>
                        <p class="text-xs text-gray-400">星辰科技 · 供应链管理中心</p>
                    </div>
                </div>
                <div class="text-right flex-shrink-0">
                    <div class="flex items-center space-x-2 mb-1">
                        <button onclick="refreshData()" class="px-3 py-2 bg-green-500 text-white rounded-lg text-xs sm:text-sm hover:bg-green-600 flex items-center space-x-1 shadow">
                            <span>🔄</span>
                            <span class="hidden sm:inline">刷新数据</span>
                        </button>
                        <button onclick="showConfig()" class="px-3 py-2 bg-gray-600 text-white rounded-lg text-xs sm:text-sm hover:bg-gray-700 shadow">
                            ⚙️
                        </button>
                    </div>
                    <div class="flex items-center justify-end space-x-2 text-sm">
                        <span class="text-gray-400">更新于</span>
                        <span id="update-time" class="font-mono font-semibold text-blue-400">--</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-3 sm:px-4 py-4 sm:py-6 space-y-4 sm:space-y-6">
        <!-- 今日价格卡片 -->
        <section>
                <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <span class="w-1 h-5 bg-blue-500 rounded mr-2"></span>
                    今日价格概览
                </h2>
                <div class="flex space-x-2 overflow-x-auto -mx-2 px-2 scrollbar-hide whitespace-nowrap">
                    <button onclick="filterMaterials('all')" class="filter-btn active px-3 py-1.5 text-sm rounded-full bg-blue-500 text-white transition-all flex-shrink-0" data-filter="all">全部</button>
                    <button onclick="filterMaterials('cu')" class="filter-btn px-3 py-1.5 text-sm rounded-full bg-white text-gray-600 hover:bg-gray-100 transition-all shadow-sm flex-shrink-0" data-filter="cu">铜铝</button>
                    <button onclick="filterMaterials('sife')" class="filter-btn px-3 py-1.5 text-sm rounded-full bg-white text-gray-600 hover:bg-gray-100 transition-all shadow-sm flex-shrink-0" data-filter="sife">硅钢</button>
                    <button onclick="filterMaterials('rare')" class="filter-btn px-3 py-1.5 text-sm rounded-full bg-white text-gray-600 hover:bg-gray-100 transition-all shadow-sm flex-shrink-0" data-filter="rare">稀土</button>
                </div>
            </div>
            <div id="price-cards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4">
                <!-- 卡片由JS生成 -->
            </div>
        </section>

        <!-- 价格走势图 -->
        <section class="bg-white rounded-2xl shadow-sm p-6">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <span class="w-1 h-5 bg-green-500 rounded mr-2"></span>
                    价格走势
                </h2>
                <div class="flex flex-wrap items-center gap-4">
                    <select id="material-select" class="px-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-gray-50">
                        <!-- 选项由JS生成 -->
                    </select>
                    <div class="flex space-x-1 bg-gray-100 rounded-lg p-1 overflow-x-auto scrollbar-hide">
                        <button onclick="setChartRange(7)" class="range-btn px-3 py-1.5 text-sm rounded-md bg-blue-500 text-white flex-shrink-0" data-range="7">7天</button>
                        <button onclick="setChartRange(30)" class="range-btn px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-white flex-shrink-0" data-range="30">30天</button>
                        <button onclick="setChartRange(90)" class="range-btn px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-white flex-shrink-0" data-range="90">90天</button>
                        <button onclick="setChartRange(180)" class="range-btn px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-white flex-shrink-0" data-range="180">半年</button>
                        <button onclick="setChartRange(365)" class="range-btn px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-white flex-shrink-0" data-range="365">一年</button>
                        <button onclick="setChartRange(0)" class="range-btn px-3 py-1.5 text-sm rounded-md text-gray-600 hover:bg-white flex-shrink-0" data-range="0">全部</button>
                    </div>
                </div>
            </div>
            <div class="relative chart-container">
                <canvas id="price-chart"></canvas>
            </div>
        </section>

        <!-- 历史数据表 -->
        <section class="bg-white rounded-2xl shadow-sm p-6">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <span class="w-1 h-5 bg-purple-500 rounded mr-2"></span>
                    历史数据
                </h2>
                <select id="history-material" class="px-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 bg-gray-50">
                    <!-- 选项由JS生成 -->
                </select>
            </div>
            
            <!-- 导出工具栏 -->
            <div class="flex flex-wrap items-center gap-3 mb-4 p-4 bg-gray-50 rounded-xl">
                <span class="text-sm text-gray-500">导出范围：</span>
                <input type="date" id="export-start" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <span class="text-gray-400">至</span>
                <input type="date" id="export-end" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                <button onclick="exportCSV()" class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600 flex items-center space-x-2 shadow-sm">
                    <span>📥</span>
                    <span>导出CSV</span>
                </button>
            </div>
            
            <div class="overflow-x-auto max-h-[400px] overflow-y-auto rounded-lg border border-gray-200">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="px-4 py-3 text-left font-semibold text-gray-600">日期</th>
                            <th class="px-4 py-3 text-right font-semibold text-gray-600" id="price-header">价格</th>
                            <th class="px-4 py-3 text-right font-semibold text-gray-600">涨跌</th>
                            <th class="px-4 py-3 text-right font-semibold text-gray-600">涨跌幅</th>
                        </tr>
                    </thead>
                    <tbody id="history-table" class="divide-y divide-gray-100">
                        <!-- 表格由JS生成 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 mt-8">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>数据来源：上海有色网(SMM) | 自动更新：每日 11:30</p>
            <p class="mt-1">© 2026 桂林星辰科技股份有限公司 · 供应链管理中心</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
