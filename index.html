<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原材料价格监控 | 星辰科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <header class="bg-slate-900 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center">
                        <span class="text-xl font-bold">¥</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">原材料价格监控</h1>
                        <p class="text-xs text-gray-400">星辰科技 · 供应链管理中心</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-300">数据更新于</p>
                    <p id="update-time" class="text-lg font-mono font-semibold text-blue-400">--</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 space-y-6">
        <!-- 今日概览卡片 -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800">今日价格概览</h2>
                <div class="flex space-x-2">
                    <button onclick="filterMaterials('all')" class="filter-btn active px-3 py-1 text-sm rounded-full bg-blue-500 text-white" data-filter="all">全部</button>
                    <button onclick="filterMaterials('cu')" class="filter-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700" data-filter="cu">铜铝</button>
                    <button onclick="filterMaterials('sife')" class="filter-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700" data-filter="sife">硅钢</button>
                    <button onclick="filterMaterials('rare')" class="filter-btn px-3 py-1 text-sm rounded-full bg-gray-200 text-gray-700" data-filter="rare">稀土</button>
                </div>
            </div>
            <div id="price-cards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4">
                <!-- 卡片由JS生成 -->
            </div>
        </section>

        <!-- 走势图 -->
        <section class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-gray-800">价格走势</h2>
                <div class="flex items-center space-x-4">
                    <select id="material-select" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                        <!-- 选项由JS生成 -->
                    </select>
                    <div class="flex space-x-1">
                        <button onclick="setChartRange(7)" class="range-btn px-3 py-1 text-sm rounded bg-blue-500 text-white" data-range="7">7天</button>
                        <button onclick="setChartRange(30)" class="range-btn px-3 py-1 text-sm rounded bg-gray-200 text-gray-700" data-range="30">30天</button>
                        <button onclick="setChartRange(90)" class="range-btn px-3 py-1 text-sm rounded bg-gray-200 text-gray-700" data-range="90">90天</button>
                        <button onclick="setChartRange(180)" class="range-btn px-3 py-1 text-sm rounded bg-gray-200 text-gray-700" data-range="180">半年</button>
                        <button onclick="setChartRange(365)" class="range-btn px-3 py-1 text-sm rounded bg-gray-200 text-gray-700" data-range="365">一年</button>
                        <button onclick="setChartRange(0)" class="range-btn px-3 py-1 text-sm rounded bg-gray-200 text-gray-700" data-range="0">全部</button>
                    </div>
                </div>
            </div>
            <div class="relative h-80">
                <canvas id="price-chart"></canvas>
            </div>
        </section>

        <div class="grid lg:grid-cols-3 gap-6">
            <!-- 行业资讯 -->
            <section class="lg:col-span-1 bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4">行业资讯</h2>
                <div id="industry-news" class="space-y-3 max-h-96 overflow-y-auto">
                    <!-- 资讯由JS生成 -->
                </div>
            </section>

            <!-- 历史数据表 -->
            <section class="lg:col-span-2 bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-gray-800">历史数据</h2>
                    <div class="flex items-center space-x-2">
                        <select id="history-material" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <!-- 选项由JS生成 -->
                        </select>
                        <button onclick="exportCSV()" class="px-3 py-2 bg-green-500 text-white rounded-lg text-sm hover:bg-green-600">
                            导出CSV
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left font-semibold text-gray-700">日期</th>
                                <th class="px-4 py-3 text-right font-semibold text-gray-700">价格</th>
                                <th class="px-4 py-3 text-right font-semibold text-gray-700">涨跌</th>
                                <th class="px-4 py-3 text-right font-semibold text-gray-700">涨跌幅</th>
                            </tr>
                        </thead>
                        <tbody id="history-table" class="divide-y divide-gray-100">
                            <!-- 表格由JS生成 -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 mt-8">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>数据来源：上海有色网(SMM) | 更新时间：每日11:30</p>
            <p class="mt-1">© 2026 桂林星辰科技股份有限公司 · 供应链管理中心</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
