name: Daily Price Update

on:
  schedule:
    # 每天11:30 UTC+8 即 03:30 UTC
    - cron: '30 3 * * *'
  workflow_dispatch:  # 手动触发
    inputs:
      force_update:
        description: '强制更新（忽略数据检查）'
        required: false
        default: 'false'

env:
  TZ: Asia/Shanghai

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests fake-useragent
      
      - name: Run price crawler (Attempt 1)
        id: crawl1
        continue-on-error: true
        run: |
          echo "=== 第1次爬取 $(date '+%Y-%m-%d %H:%M:%S') ==="
          python scripts/crawl_prices.py
          echo "crawl_status=$?" >> $GITHUB_OUTPUT
      
      - name: Wait and retry (Attempt 2)
        if: steps.crawl1.outcome == 'failure'
        run: |
          echo "第1次失败，等待5分钟后重试..."
          sleep 300
          echo "=== 第2次爬取 $(date '+%Y-%m-%d %H:%M:%S') ==="
          python scripts/crawl_prices.py || true
      
      - name: Wait and retry (Attempt 3)
        if: steps.crawl1.outcome == 'failure'
        run: |
          echo "第2次失败，等待3分钟后重试..."
          sleep 180
          echo "=== 第3次爬取 $(date '+%Y-%m-%d %H:%M:%S') ==="
          python scripts/crawl_prices.py || true
      
      - name: Run industry news crawler
        run: python scripts/crawl_industry.py
      
      - name: Check data quality
        id: check
        run: |
          # 检查数据文件是否存在且有效
          if [ -f "data/prices.json" ]; then
            update_time=$(python -c "import json; d=json.load(open('data/prices.json')); print(d.get('update_time', 'N/A'))")
            count=$(python -c "import json; d=json.load(open('data/prices.json')); print(len(d.get('today', [])))")
            echo "更新时间: $update_time"
            echo "材料数量: $count"
            echo "update_time=$update_time" >> $GITHUB_OUTPUT
            echo "count=$count" >> $GITHUB_OUTPUT
            if [ "$count" -lt 8 ]; then
              echo "⚠️ 警告: 只获取到 $count 种材料价格"
            fi
          else
            echo "❌ 错误: prices.json 不存在"
            exit 1
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加数据文件
          git add data/prices.json data/industry.json data/today.json 2>/dev/null || true
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有数据变更，跳过提交"
          else
            update_time=$(date '+%Y-%m-%d %H:%M')
            git commit -m "📊 自动更新价格数据 - $update_time"
            git push
            echo "✅ 数据已推送到仓库"
          fi
      
      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 价格爬取失败 - ${date}`,
              body: `自动爬取任务执行失败，请手动检查。\n\n时间: ${date}\n\n请检查:\n1. 目标网站是否可访问\n2. 页面结构是否变化\n3. 反爬机制是否加强`,
              labels: ['automated', 'bug']
            });
