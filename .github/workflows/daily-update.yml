name: Daily Price Update

on:
  schedule:
    # 每天11:30 UTC+8 即 03:30 UTC（主任务）
    - cron: '30 3 * * *'
    # 11:55 补跑一次，防止GitHub cron跳票
    - cron: '55 3 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新'
        required: false
        default: 'false'

env:
  TZ: Asia/Shanghai

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run price crawler (Attempt 1)
        id: crawl1
        continue-on-error: true
        run: |
          echo "=== 第1次爬取 $(date '+%Y-%m-%d %H:%M:%S') ==="
          python scripts/crawl_prices.py
          echo "crawl_status=$?" >> $GITHUB_OUTPUT
      
      - name: Wait and retry (Attempt 2)
        if: steps.crawl1.outcome == 'failure'
        run: |
          echo "第1次失败，等待5分钟后重试..."
          sleep 300
          echo "=== 第2次爬取 $(date '+%Y-%m-%d %H:%M:%S') ==="
          python scripts/crawl_prices.py || true
      
      - name: Wait and retry (Attempt 3)
        if: steps.crawl1.outcome == 'failure'
        run: |
          echo "第2次失败，等待3分钟后重试..."
          sleep 180
          echo "=== 第3次爬取 $(date '+%Y-%m-%d %H:%M:%S') ==="
          python scripts/crawl_prices.py || true
      
      - name: Check data quality
        run: |
          if [ -f "data/prices.json" ]; then
            update_time=$(python -c "import json; d=json.load(open('data/prices.json')); print(d.get('update_time', 'N/A'))")
            count=$(python -c "import json; d=json.load(open('data/prices.json')); print(len(d.get('today', [])))")
            history_count=$(python -c "import json; d=json.load(open('data/prices.json')); print(sum(len(v) for v in d.get('history', {}).values()))")
            echo "更新时间: $update_time"
            echo "今日材料: $count 种"
            echo "历史记录: $history_count 条"
          else
            echo "错误: prices.json 不存在"
            exit 1
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/prices.json data/today.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "没有数据变更"
          else
            update_time=$(date '+%Y-%m-%d %H:%M')
            git commit -m "📊 自动更新价格数据 - $update_time"
            git push
            echo "✅ 数据已推送"
          fi
